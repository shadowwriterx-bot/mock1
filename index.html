<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mock Test - O'quvchi</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .section-title { background: #e1f5fe; padding: 12px; border-radius: 8px; font-weight: bold; margin: 25px 0 15px; text-align: center; color: #0277bd; }
        .q-box { border-bottom: 2px solid #f0f0f0; padding: 20px 0; }
        .options { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .opt { flex: 1; min-width: 45px; text-align: center; }
        .opt input { display: none; }
        .opt label { display: block; padding: 10px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; background: #fafafa; }
        .opt input:checked + label { background: #0088cc; color: white; border-color: #0088cc; }
        .math-toolbar { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
        .math-btn { padding: 8px 12px; background: #eee; border: 1px solid #ccc; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .math-btn:active { background: #ddd; }
        .written-input { width: 92%; padding: 12px; border: 2px solid #0088cc; border-radius: 8px; font-size: 16px; margin-top: 5px; background: #fff; }
        button#send { width: 100%; padding: 18px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; margin-top: 35px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#0088cc">Mock Test</h2>
        <div class="section-title">I-QISM: TEST (1-35)</div>
        <div id="test-part"></div>
        <div class="section-title">II-QISM: YOZMA (36-45 A/B)</div>
        <div id="written-part"></div>
        <button id="send" onclick="send()">Javoblarni Yuborish</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const testD = document.getElementById('test-part');
        const writD = document.getElementById('written-part');

        for(let i=1; i<=35; i++){
            let vars = (i >= 33) ? ['A','B','C','D','E','F'] : ['A','B','C','D'];
            let opts = "";
            vars.forEach(o => { opts += `<div class="opt"><input type="radio" name="q${i}" id="q${i}${o}" value="${o}"><label for="q${i}${o}">${o}</label></div>`; });
            testD.innerHTML += `<div class="q-box"><b>${i}. Savol</b><div class="options">${opts}</div></div>`;
        }

        // Belgini to'g'ri katakka kiritish funksiyasi
        function ins(id, v) { 
            const el = document.getElementById(id); 
            el.value += v; 
            el.focus(); 
        }

        for(let i=36; i<=45; i++){
            writD.innerHTML += `
            <div class="q-box">
                <b style="color:#d32f2f">${i}-savol yozma:</b><br><br>
                
                <b>A qismi:</b>
                <div class="math-toolbar">
                    <button class="math-btn" onclick="ins('w${i}a','√')">√</button>
                    <button class="math-btn" onclick="ins('w${i}a','^')">^</button>
                    <button class="math-btn" onclick="ins('w${i}a','/')">/</button>
                    <button class="math-btn" onclick="ins('w${i}a','sin(')">sin</button>
                    <button class="math-btn" onclick="ins('w${i}a','cos(')">cos</button>
                </div>
                <input type="text" id="w${i}a" class="written-input" placeholder="A variant javobi...">
                
                <br><br>
                <b>B qismi:</b>
                <div class="math-toolbar">
                    <button class="math-btn" onclick="ins('w${i}b','√')">√</button>
                    <button class="math-btn" onclick="ins('w${i}b','^')">^</button>
                    <button class="math-btn" onclick="ins('w${i}b','/')">/</button>
                    <button class="math-btn" onclick="ins('w${i}b','sin(')">sin</button>
                    <button class="math-btn" onclick="ins('w${i}b','cos(')">cos</button>
                </div>
                <input type="text" id="w${i}b" class="written-input" placeholder="B variant javobi...">
            </div>`;
        }

        function send() {
            let t = ""; let w = [];
            for(let i=1; i<=35; i++){
                let s = document.querySelector(`input[name="q${i}"]:checked`);
                t += s ? s.value : "X";
            }
            for(let i=36; i<=45; i++){
                w.push(document.getElementById('w'+i+'a').value.trim() || "BO'SH");
                w.push(document.getElementById('w'+i+'b').value.trim() || "BO'SH");
            }
            tg.sendData(t + " " + w.join(","));
            tg.close();
        }
    </script>
</body>
</html>
